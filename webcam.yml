name: webcam download

on:
  schedule:
    - cron: '0 2 * * *'

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: install python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: install libraries
        run: |
          pip install requests beautifulsoup4

      - name: run script
        run: |
          python webcam_download.py